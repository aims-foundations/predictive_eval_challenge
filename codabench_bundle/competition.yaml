version: 2

title: Predictive AI Evaluation Challenge
description: Can we predict how AI models will perform on unseen benchmark items?
image: logo.png
registration_auto_approve: True
docker_image: 'codalab/codalab-legacy:py37'

terms: pages/terms.md

pages:
  - title: Overview
    file: pages/description.md
  - title: Evaluation
    file: pages/evaluation.md
  - title: Data
    file: pages/data.md
  - title: Terms and Conditions
    file: pages/terms.md

tasks:
  - index: 0
    name: Amortized Prediction (Dev)
    description: Development phase. Predict model performance on new unseen items.
    is_public: false
    input_data: input_data
    reference_data: reference_data
    scoring_program: scoring_program
    ingestion_program: ingestion_program
  - index: 1
    name: Amortized Prediction (Final)
    description: Final phase. Submissions evaluated on held-out test data.
    is_public: false
    input_data: input_data
    reference_data: reference_data
    scoring_program: scoring_program
    ingestion_program: ingestion_program

solutions: []

phases:
  - index: 0
    name: Development
    description: Submit your prediction pipeline. Feedback on validation set.
    start: 4-1-2026
    end: 6-30-2026
    max_submissions_per_day: 5
    max_submissions: 100
    execution_time_limit: 1800
    tasks:
      - 0
    solutions: []
  - index: 1
    name: Final
    description: Submissions evaluated on separate held-out test set.
    start: 7-1-2026
    end: 8-1-2026
    max_submissions_per_day: 2
    max_submissions: 50
    execution_time_limit: 3600
    tasks:
      - 1
    solutions: []

leaderboards:
  - index: 0
    title: Amortized Prediction
    key: track1
    columns:
      - title: AUC-ROC
        key: track1_auc_roc
        index: 0
        sorting: desc
        computation: null
        computation_indexes: null
      - title: Log-Loss
        key: track1_log_loss
        index: 1
        sorting: asc
        computation: null
        computation_indexes: null
